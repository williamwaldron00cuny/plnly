<!-- @dsCard group="Type" viewport="700x200" name="The four voices" subtitle="Each used once per composition — Outfit · Newsreader · Hanken · Plex Mono" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .c{background:var(--plnly-surface);border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);padding:22px;}
  .big{font-size:36px;color:var(--plnly-ink);line-height:1;}
  .role{font-family:var(--plnly-font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--plnly-ink-35);margin-top:14px;}
</style></head>
<body><div class="wrap">
  <div class="c"><div class="big" style="font-family:var(--plnly-font-display);font-weight:500;letter-spacing:-.01em">Outfit</div><div class="role">Display &amp; headline · the wordmark</div></div>
  <div class="c"><div class="big" style="font-family:var(--plnly-font-serif);font-style:italic;color:var(--plnly-coral-deep)">Newsreader</div><div class="role">The elevated word · the reveal</div></div>
  <div class="c"><div class="big" style="font-family:var(--plnly-font-body)">Hanken</div><div class="role">Body &amp; interface · the workhorse</div></div>
  <div class="c"><div class="big" style="font-family:var(--plnly-font-mono);font-size:30px">IBM Plex Mono</div><div class="role">Labels &amp; data · the stamp</div></div>
</div></body></html>
