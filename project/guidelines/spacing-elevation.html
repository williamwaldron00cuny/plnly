<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);font-family:var(--plnly-font-mono);}
  .wrap{padding:28px 24px;display:flex;gap:30px;align-items:center;}
  .box{width:96px;height:60px;background:var(--plnly-surface);border-radius:var(--plnly-radius-card);}
  .lbl{font-size:10px;color:var(--plnly-ink-35);margin-top:14px;text-align:center;line-height:1.5;}
</style></head>
<body><div class="wrap">
  <div><div class="box" style="box-shadow:var(--plnly-shadow-raised)"></div><div class="lbl">Raised<br>cards</div></div>
  <div><div class="box" style="box-shadow:var(--plnly-shadow-floating)"></div><div class="lbl">Floating<br>menus</div></div>
  <div><div class="box" style="box-shadow:var(--plnly-shadow-overlay)"></div><div class="lbl">Overlay<br>modals</div></div>
</div></body></html>
