<!-- @dsCard group="Colors" viewport="700x150" name="Layered hues · ~8%" subtitle="Soft, desaturated — each a candidate sub-brand tone" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);font-family:var(--plnly-font-mono);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{height:84px;border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);position:relative;}
  .lbl{font-size:10px;color:var(--plnly-ink-55);margin-top:9px;line-height:1.5;text-transform:uppercase;letter-spacing:.04em;}
  .hex{color:var(--plnly-ink-35);}
  .new{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--plnly-coral);}
</style></head>
<body><div class="wrap">
  <div><div class="sw" style="background:var(--plnly-mist)"></div><div class="lbl">Mist Blue<br><span class="hex">#9FB1BB · calm</span></div></div>
  <div><div class="sw" style="background:var(--plnly-harbor)"></div><div class="lbl">Harbor<br><span class="hex">#3E4F59 · alt ink</span></div></div>
  <div><div class="sw" style="background:var(--plnly-eucalyptus)"></div><div class="lbl">Eucalyptus<br><span class="hex">#5E7468 · green</span></div></div>
  <div><div class="sw" style="background:var(--plnly-mint)"><span class="new"></span></div><div class="lbl">Mint<br><span class="hex">#C2D8CC · fresh</span></div></div>
</div></body></html>
