<!-- @dsCard group="Type" viewport="700x340" name="The scale" subtitle="Display 60 → Caption 12, on Outfit, Hanken & the mono" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:18px 24px;background:var(--plnly-surface);margin:18px 24px;border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);}
  .row{display:flex;align-items:baseline;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--plnly-border);}
  .row:last-child{border-bottom:none;}
  .spec{font-family:var(--plnly-font-mono);font-size:9.5px;color:var(--plnly-ink-35);text-align:right;line-height:1.6;}
  .o{font-family:var(--plnly-font-display);color:var(--plnly-ink);line-height:1;}
  .h{font-family:var(--plnly-font-body);color:var(--plnly-ink-80);line-height:1;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="o" style="font-weight:500;font-size:48px;letter-spacing:-.02em">Display</div><div class="spec">OUTFIT MEDIUM · 60</div></div>
  <div class="row"><div class="o" style="font-weight:500;font-size:36px;letter-spacing:-.015em">Heading 1</div><div class="spec">OUTFIT MEDIUM · 44</div></div>
  <div class="row"><div class="o" style="font-weight:500;font-size:28px;letter-spacing:-.01em">Heading 2</div><div class="spec">OUTFIT MEDIUM · 32</div></div>
  <div class="row"><div class="o" style="font-weight:400;font-size:22px">Heading 3</div><div class="spec">OUTFIT REGULAR · 24</div></div>
  <div class="row"><div class="h" style="font-size:18px">Lead paragraph</div><div class="spec">HANKEN · 19 / 1.5</div></div>
  <div class="row"><div class="h" style="font-size:16px">Body text</div><div class="spec">HANKEN · 16 / 1.6</div></div>
  <div class="row"><div class="h" style="font-size:14px;color:var(--plnly-ink-55)">Small / secondary</div><div class="spec">HANKEN · 14 / 1.55</div></div>
  <div class="row"><div style="font-family:var(--plnly-font-mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--plnly-ink-55)">Caption / label</div><div class="spec">PLEX MONO · 12 · .16em</div></div>
</div></body></html>
