<!-- @dsCard group="Brand" viewport="700x150" name="Abstract icons" subtitle="Built from the dot, ring & line · 24px grid · 1.75px stroke · coral means something" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:22px 24px;display:grid;grid-template-columns:repeat(8,1fr);gap:10px;}
  .c{background:var(--plnly-surface);border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);padding:16px 8px;text-align:center;}
  .l{font-family:var(--plnly-font-mono);font-size:8.5px;letter-spacing:.05em;color:var(--plnly-ink-35);margin-top:10px;text-transform:uppercase;}
  svg{display:inline-block}
</style></head>
<body><div class="wrap">
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="#20242B" stroke-width="1.75"/></svg><div class="l">Ring</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="#20242B" stroke-width="1.75"/><circle cx="12" cy="12" r="2.6" fill="#E25E3A"/></svg><div class="l">Focus</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="#20242B" stroke-width="1.75"/><line x1="12" y1="12" x2="12" y2="7" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/><line x1="12" y1="12" x2="15.5" y2="13.5" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/></svg><div class="l">Time</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><line x1="5" y1="8" x2="19" y2="8" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/><line x1="5" y1="16" x2="14" y2="16" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/></svg><div class="l">Plan</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><line x1="4" y1="12" x2="18" y2="12" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/><polyline points="13,7 18,12 13,17" stroke="#E25E3A" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><div class="l">Handover</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="#20242B" stroke-width="1.75" stroke-linecap="round"/></svg><div class="l">Add</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M5 9 V5 H9" stroke="#20242B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M19 9 V5 H15" stroke="#20242B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M5 15 V19 H9" stroke="#20242B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M19 15 V19 H15" stroke="#20242B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><div class="l">Place</div></div>
  <div class="c"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.2" stroke="#20242B" stroke-width="1.75"/><circle cx="12" cy="12" r="8.5" stroke="#20242B" stroke-width="1.75" stroke-dasharray="2 3"/></svg><div class="l">Orbit</div></div>
</div></body></html>
