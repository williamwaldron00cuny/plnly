<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals · the 70%" subtitle="Greige leads, ink anchors — the world the brand lives in" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);font-family:var(--plnly-font-mono);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{height:84px;border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);}
  .lbl{font-size:10px;color:var(--plnly-ink-55);margin-top:9px;line-height:1.5;text-transform:uppercase;letter-spacing:.04em;}
  .hex{color:var(--plnly-ink-35);}
</style></head>
<body><div class="wrap">
  <div><div class="sw" style="background:var(--plnly-porcelain)"></div><div class="lbl">Porcelain<br><span class="hex">#EFEDE7</span></div></div>
  <div><div class="sw" style="background:var(--plnly-greige)"></div><div class="lbl">Greige · ground<br><span class="hex">#E3E1DA</span></div></div>
  <div><div class="sw" style="background:var(--plnly-greige-deep)"></div><div class="lbl">Greige Deep<br><span class="hex">#D2CFC6</span></div></div>
  <div><div class="sw" style="background:var(--plnly-taupe)"></div><div class="lbl">Taupe<br><span class="hex">#8A8A85</span></div></div>
  <div><div class="sw" style="background:var(--plnly-ink)"></div><div class="lbl">Ink<br><span class="hex">#20242B</span></div></div>
</div></body></html>
