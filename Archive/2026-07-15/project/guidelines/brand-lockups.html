<!-- @dsCard group="Brand" viewport="700x230" name="The lockup · variations" subtitle="PLNLY never appears without plainly on first contact" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .f{height:150px;border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);display:flex;align-items:center;justify-content:center;background:var(--plnly-porcelain);}
  .ink{background:var(--plnly-ink);}
  .stack{text-align:center;}
  .mk{font-family:var(--plnly-font-display);font-weight:500;letter-spacing:.045em;color:var(--plnly-ink);line-height:1;}
  .div{width:28px;height:1px;background:var(--plnly-ink);opacity:.45;margin:8px auto;}
  .rev{font-family:var(--plnly-font-serif);font-style:italic;letter-spacing:.16em;color:var(--plnly-coral);padding-left:.16em;line-height:1;}
  .cap{font-family:var(--plnly-font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--plnly-ink-35);margin-top:9px;text-align:center;}
  .disc{width:80px;height:80px;border-radius:50%;background:var(--plnly-ink);display:flex;align-items:center;justify-content:center;}
</style></head>
<body><div class="wrap">
  <div>
    <div class="f"><div class="stack"><div class="mk" style="font-size:48px">PLNLY</div><div class="div"></div><div class="rev" style="font-size:16px">plainly</div></div></div>
    <div class="cap">Stacked · primary</div>
  </div>
  <div>
    <div class="f ink"><div class="disc"><span style="font-family:var(--plnly-font-display);font-weight:500;font-size:38px;color:var(--plnly-porcelain)">P<span style="color:var(--plnly-coral)">.</span></span></div></div>
    <div class="cap">Compact · the P.</div>
  </div>
  <div>
    <div class="f ink"><div class="stack"><div class="mk" style="font-size:40px;color:var(--plnly-on-ink)">PL<span style="color:var(--plnly-coral)">AI</span>NLY</div><div class="div" style="background:var(--plnly-on-ink)"></div><div class="rev" style="font-size:14px">plainly</div></div></div>
    <div class="cap">PL·AI·NLY · sub-brand</div>
  </div>
</div></body></html>
