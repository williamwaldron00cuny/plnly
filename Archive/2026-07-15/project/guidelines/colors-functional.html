<!-- @dsCard group="Colors" viewport="700x140" name="Functional · UI status" subtitle="Muted to match — error sits deeper than brand coral" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);font-family:var(--plnly-font-mono);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{height:62px;border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);}
  .lbl{font-size:10px;color:var(--plnly-ink-55);margin-top:9px;text-transform:uppercase;letter-spacing:.04em;}
  .hex{color:var(--plnly-ink-35);}
</style></head>
<body><div class="wrap">
  <div><div class="sw" style="background:var(--plnly-success)"></div><div class="lbl">Success<br><span class="hex">#4F7A5E</span></div></div>
  <div><div class="sw" style="background:var(--plnly-info)"></div><div class="lbl">Info<br><span class="hex">#5E7E92</span></div></div>
  <div><div class="sw" style="background:var(--plnly-caution)"></div><div class="lbl">Caution<br><span class="hex">#BE7A35</span></div></div>
  <div><div class="sw" style="background:var(--plnly-error)"></div><div class="lbl">Error<br><span class="hex">#C0432A</span></div></div>
</div></body></html>
