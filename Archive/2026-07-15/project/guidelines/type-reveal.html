<!-- @dsCard group="Type" viewport="700x180" name="The elevated word" subtitle="One Newsreader italic moment per composition — never a whole sentence" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-ink);}
  .wrap{padding:40px 30px;display:flex;flex-direction:column;gap:22px;justify-content:center;min-height:100px;}
  .line{font-family:var(--plnly-font-display);font-weight:500;font-size:34px;color:var(--plnly-on-ink);line-height:1.18;letter-spacing:-.01em;}
  .em{font-family:var(--plnly-font-serif);font-style:italic;font-weight:300;color:var(--plnly-coral);}
</style></head>
<body><div class="wrap">
  <div class="line">Built bespoke. <span class="em">Yours to run.</span></div>
  <div class="line">A <span class="em">beautiful</span> plainness.</div>
</div></body></html>
