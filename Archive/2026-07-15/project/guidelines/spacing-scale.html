<!-- @dsCard group="Spacing" viewport="700x280" name="The spacing scale" subtitle="8-point rhythm · 4 as a half-step · 96–128 between sections" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:18px 28px;background:var(--plnly-surface);margin:18px 24px;border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);}
  .row{display:flex;align-items:center;gap:18px;padding:6px 0;}
  .k{font-family:var(--plnly-font-mono);font-size:11px;color:var(--plnly-ink-35);width:104px;}
  .b{height:13px;border-radius:1px;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="k">4 · half-step</div><div class="b" style="width:4px;background:var(--plnly-coral)"></div></div>
  <div class="row"><div class="k">8 · base</div><div class="b" style="width:8px;background:var(--plnly-coral)"></div></div>
  <div class="row"><div class="k">12</div><div class="b" style="width:12px;background:var(--plnly-ink)"></div></div>
  <div class="row"><div class="k">16</div><div class="b" style="width:16px;background:var(--plnly-ink)"></div></div>
  <div class="row"><div class="k">24</div><div class="b" style="width:24px;background:var(--plnly-ink)"></div></div>
  <div class="row"><div class="k">32</div><div class="b" style="width:32px;background:var(--plnly-ink)"></div></div>
  <div class="row"><div class="k">48</div><div class="b" style="width:48px;background:var(--plnly-ink)"></div></div>
  <div class="row"><div class="k">64</div><div class="b" style="width:64px;background:var(--plnly-ink)"></div></div>
  <div class="row"><div class="k">96 · section</div><div class="b" style="width:96px;background:var(--plnly-eucalyptus)"></div></div>
  <div class="row"><div class="k">128 · major</div><div class="b" style="width:128px;background:var(--plnly-eucalyptus)"></div></div>
</div></body></html>
