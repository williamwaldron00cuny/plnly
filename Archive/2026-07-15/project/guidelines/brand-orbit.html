<!-- @dsCard group="Brand" viewport="700x230" name="The quiet orbit" subtitle="The cosmic nod that replaces every AI cliché — coral household, satellites" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:24px;display:grid;grid-template-columns:1fr 1.2fr;gap:16px;align-items:stretch;}
  .ink{background:var(--plnly-ink);border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);display:flex;align-items:center;justify-content:center;min-height:180px;overflow:hidden;}
  .note{background:var(--plnly-surface);border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);padding:26px;display:flex;flex-direction:column;justify-content:center;}
  .t{font-family:var(--plnly-font-display);font-weight:500;font-size:18px;color:var(--plnly-ink);}
  .p{font-family:var(--plnly-font-body);font-size:13px;line-height:1.6;color:var(--plnly-ink-65);margin:10px 0 0;}
  .em{font-family:var(--plnly-font-serif);font-style:italic;color:var(--plnly-coral-deep);}
</style></head>
<body><div class="wrap">
  <div class="ink">
    <svg width="190" height="190" viewBox="0 0 240 240" fill="none">
      <circle cx="120" cy="120" r="40" stroke="#3b4048" stroke-width="1"/>
      <circle cx="120" cy="120" r="72" stroke="#343941" stroke-width="1"/>
      <circle cx="120" cy="120" r="104" stroke="#2c313a" stroke-width="1"/>
      <circle cx="120" cy="120" r="6" fill="#E25E3A"/>
      <circle cx="192" cy="120" r="4" fill="#9FB1BB"/>
      <circle cx="80" cy="48" r="4.5" fill="#C2D8CC"/>
    </svg>
  </div>
  <div class="note">
    <div class="t">A system, in orbit around you.</div>
    <p class="p">Concentric hairline rings, a coral center — the household at the middle, the tools quietly circling. Use it large &amp; faint behind copy, small as a section marker, or on ink as the avatar.</p>
    <p class="p"><span class="em">No circuits, no neural lines, no robots. Just orbit.</span></p>
  </div>
</div></body></html>
