<!-- @dsCard group="Colors" viewport="700x180" name="The accent · coral ~2%" subtitle="The reveal, the dot, one moment per view — Coral Deep for text" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);font-family:var(--plnly-font-mono);}
  .wrap{padding:24px;display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:stretch;}
  .big{background:var(--plnly-coral);border-radius:var(--plnly-radius-card);box-shadow:var(--plnly-shadow-raised);padding:22px;display:flex;flex-direction:column;justify-content:space-between;min-height:130px;}
  .dot{width:26px;height:26px;border-radius:50%;background:var(--plnly-ink);}
  .name{font-family:var(--plnly-font-display);font-weight:500;font-size:26px;color:var(--plnly-cream);}
  .meta{font-size:10px;color:#3a1d12;letter-spacing:.08em;margin-top:4px;}
  .pair{display:flex;flex-direction:column;gap:8px;justify-content:center;}
  .row{display:flex;gap:8px;}
  .chip{flex:1;height:40px;border-radius:var(--plnly-radius-chip);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
  .note{font-size:10px;color:var(--plnly-ink-45);line-height:1.5;}
</style></head>
<body><div class="wrap">
  <div class="big"><div class="dot"></div><div><div class="name">Coral</div><div class="meta">#E25E3A</div></div></div>
  <div class="pair">
    <div class="row">
      <div class="chip" style="background:var(--plnly-coral)">#E25E3A</div>
      <div class="chip" style="background:var(--plnly-coral-deep)">#B8492A</div>
    </div>
    <div class="note">Coral lives on the <span style="font-family:var(--plnly-font-serif);font-style:italic;color:var(--plnly-coral-deep)">plainly</span> reveal, the dot, one link/button per view. Coral Deep is the text-safe version on light & for hover.</div>
  </div>
</div></body></html>
