<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius · restrained" subtitle="Mostly square — 2 chips · 4 cards · 12 tiles · pill buttons" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);font-family:var(--plnly-font-mono);}
  .wrap{padding:24px;display:flex;gap:24px;align-items:flex-end;}
  .box{width:72px;height:72px;background:var(--plnly-greige-deep);}
  .lbl{font-size:10px;color:var(--plnly-ink-35);margin-top:10px;text-align:center;line-height:1.5;}
</style></head>
<body><div class="wrap">
  <div><div class="box" style="border-radius:var(--plnly-radius-chip)"></div><div class="lbl">2px<br>chips</div></div>
  <div><div class="box" style="border-radius:var(--plnly-radius-card)"></div><div class="lbl">4px<br>cards</div></div>
  <div><div class="box" style="border-radius:var(--plnly-radius-tile)"></div><div class="lbl">12px<br>tiles</div></div>
  <div><div class="box" style="border-radius:var(--plnly-radius-pill)"></div><div class="lbl">pill<br>buttons</div></div>
</div></body></html>
