<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--plnly-greige);}
  .wrap{padding:28px;display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .panel{background:var(--plnly-ink);border-radius:var(--plnly-radius-card);padding:18px 20px;display:flex;gap:14px;align-items:center;}
</style></head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Card, Badge, Eyebrow, Icon } = window.PLNLYDesignSystem_1cc2e7;
  function Demo(){
    return (<>
      <div className="row">
        <Button>Start the setup</Button>
        <Button variant="secondary">See how it works</Button>
        <Button variant="ghost" dot={false}>Learn more</Button>
        <Button size="sm">Book a call</Button>
        <Button disabled>Unavailable</Button>
      </div>
      <div className="panel">
        <Button onInk>Start the setup</Button>
        <Button variant="secondary" onInk>Not now</Button>
      </div>
      <div className="row">
        <Badge color="mint">FIELD NOTE</Badge>
        <Badge color="mist">CALM</Badge>
        <Badge color="coral" mono={false}>New</Badge>
        <Badge tone="status" color="success" dot>Set up</Badge>
        <Badge tone="status" color="caution" dot>Pending</Badge>
        <Badge tone="status" color="error" dot>Failed</Badge>
      </div>
      <div className="row">
        <Card surface="white" style={{flex:1, minWidth:220}}>
          <Eyebrow>How it works</Eyebrow>
          <div style={{display:'flex',alignItems:'center',gap:12,marginTop:14}}>
            <Icon name="focus" size={34} />
            <div style={{fontFamily:'var(--plnly-font-display)',fontWeight:500,fontSize:18,color:'var(--plnly-ink)'}}>Set up around you</div>
          </div>
          <p style={{fontFamily:'var(--plnly-font-body)',fontSize:14,lineHeight:1.6,color:'var(--plnly-ink-55)',margin:'10px 0 0'}}>Configured to your household's real rhythm — not a template.</p>
        </Card>
        <Card surface="quiet" elevation="flat" style={{flex:1, minWidth:220}}>
          <Eyebrow dot>A quiet card</Eyebrow>
          <div style={{fontFamily:'var(--plnly-font-display)',fontWeight:500,fontSize:18,color:'var(--plnly-ink)',marginTop:14}}>Greige on greige.</div>
          <p style={{fontFamily:'var(--plnly-font-body)',fontSize:14,lineHeight:1.6,color:'var(--plnly-ink-55)',margin:'8px 0 0'}}>The inset panel — flat, no shadow.</p>
        </Card>
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
